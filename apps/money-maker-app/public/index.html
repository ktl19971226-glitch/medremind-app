<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101418">
  <title>賺大錢</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">自用 TestFlight</p>
        <h1>賺大錢</h1>
        <p class="sync-state" id="sync-state">私有同步準備中</p>
      </div>
      <div class="top-actions">
        <button class="icon-button" id="export-btn" type="button" title="匯出 CSV">CSV</button>
      </div>
    </header>

    <main>
      <section class="hero-panel" aria-label="本月總覽">
        <div class="section-head">
          <div>
            <h2>本月總覽</h2>
            <p id="profit-note">本月資料整理中</p>
          </div>
          <button class="secondary-button" id="export-monthly-btn" type="button">月報</button>
        </div>
        <div class="summary-band" aria-label="損益統計">
          <div class="profit-cell">
            <span>本月淨利</span>
            <strong id="month-profit">$0</strong>
          </div>
          <div>
            <span>本月收入</span>
            <strong id="month-income">$0</strong>
          </div>
          <div>
            <span>本月成本</span>
            <strong id="month-cost">$0</strong>
          </div>
        </div>
        <div class="dashboard-grid" aria-label="儀表板">
          <div>
            <span>油耗</span>
            <strong id="month-fuel">$0</strong>
          </div>
          <div>
            <span>保養</span>
            <strong id="month-maintenance">$0</strong>
          </div>
          <div>
            <span>待確認</span>
            <strong id="issue-count">0</strong>
          </div>
          <div>
            <span>總筆數</span>
            <strong id="total-count">0</strong>
          </div>
        </div>
      </section>

      <section class="scan-panel" aria-label="掃描">
        <div class="section-head">
          <div>
            <h2 id="form-title">和泰托運紀錄</h2>
            <p id="form-subtitle">掃描或手動輸入配送日期、流水號、運送區間、附加費用。</p>
          </div>
        </div>
        <div class="scan-actions">
          <label class="scan-button">
            <input id="scan-camera" type="file" accept="image/*" capture="environment" multiple>
            拍照掃描
          </label>
          <label class="scan-button secondary-scan">
            <input id="scan-upload" type="file" accept="image/*,.xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" multiple>
            上傳檔案
          </label>
        </div>
        <div class="scan-state" id="scan-state"></div>
      </section>

      <nav class="mode-grid" aria-label="功能">
        <button class="mode-card" data-type="auto" type="button">
          <span>AI</span>
          <strong>自動分類</strong>
        </button>
        <button class="mode-card active" data-type="hotai" type="button">
          <span>和泰</span>
          <strong>托運紀錄</strong>
        </button>
        <button class="mode-card" data-type="taichung" type="button">
          <span>泰中</span>
          <strong>托運紀錄</strong>
        </button>
        <button class="mode-card" data-type="fuel" type="button">
          <span>油耗</span>
          <strong>成本紀錄</strong>
        </button>
        <button class="mode-card" data-type="maintenance" type="button">
          <span>保養</span>
          <strong>維修紀錄</strong>
        </button>
        <button class="mode-card" data-type="reconciliation" type="button">
          <span>月底</span>
          <strong>AI 對帳</strong>
        </button>
      </nav>

      <form class="entry-form" id="entry-form" autocomplete="off"></form>

      <section class="insight-panel" aria-label="待確認提醒">
        <div class="section-head">
          <div>
            <h2>待確認</h2>
            <p>缺漏、重複單號與對帳差額</p>
          </div>
        </div>
        <ul class="alert-list" id="alert-list"></ul>
      </section>

      <section class="insight-panel two-column" aria-label="分析">
        <div>
          <div class="section-head compact">
            <div>
              <h2>月結損益</h2>
              <p>收入、來源與對帳</p>
            </div>
          </div>
          <div class="metric-list" id="source-stats"></div>
        </div>
        <div>
          <div class="section-head compact">
            <div>
              <h2>車輛成本</h2>
              <p>油耗、里程與保養</p>
            </div>
          </div>
          <div class="metric-list" id="cost-trends"></div>
        </div>
      </section>

      <section class="toolbar">
        <input id="search-input" type="search" placeholder="搜尋全部紀錄：日期、單號、廠商或備註">
        <button id="clear-filter" type="button">清除</button>
      </section>

      <section class="record-list" id="record-list" aria-label="紀錄列表"></section>
    </main>
  </div>

  <template id="record-template">
    <article class="record-card">
      <div class="record-head">
        <div>
          <p class="record-type"></p>
          <h3></h3>
        </div>
        <div class="record-actions">
          <button class="edit-record" type="button">編輯</button>
          <button class="delete-record" type="button">刪除</button>
        </div>
      </div>
      <dl></dl>
    </article>
  </template>

  <script src="/app.js" defer></script>
</body>
</html>
