name: Build Local Alert iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches:
      - local-alert-ios-app
    paths:
      - 'trigger-local-alert-build.txt'

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Prepare iOS native project
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_BASE: https://local-alert.yaojidecare.app
        run: |
          set -euo pipefail
          npx expo prebuild --platform ios --no-install
          cd ios
          pod install

      - name: Install Apple signing assets
        env:
          IOS_DISTRIBUTION_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
          IOS_DISTRIBUTION_P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_PRIVATE_KEY_BASE64 }}
          APPSTORE_PROFILE_ID: GCJR3W74GQ
        run: |
          set -euo pipefail
          : "${IOS_DISTRIBUTION_P12_BASE64:?Missing IOS_DISTRIBUTION_P12_BASE64 secret}"
          : "${IOS_DISTRIBUTION_P12_PASSWORD:?Missing IOS_DISTRIBUTION_P12_PASSWORD secret}"
          : "${APPSTORE_KEY_ID:?Missing APPSTORE_KEY_ID secret}"
          : "${APPSTORE_ISSUER_ID:?Missing APPSTORE_ISSUER_ID secret}"
          : "${APPSTORE_PRIVATE_KEY_BASE64:?Missing APPSTORE_PRIVATE_KEY_BASE64 secret}"

          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-ci-keychain-password}"
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/local-alert-appstore.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/local-alert-signing.keychain-db"

          echo "$IOS_DISTRIBUTION_P12_BASE64" | base64 --decode > "$CERT_PATH"
          export PROFILE_PATH APPSTORE_PROFILE_ID

          node <<'NODE'
          const crypto = require('crypto');
          const fs = require('fs');

          function base64url(input) {
            return Buffer.from(input).toString('base64').replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
          }

          const header = { alg: 'ES256', kid: process.env.APPSTORE_KEY_ID, typ: 'JWT' };
          const payload = {
            iss: process.env.APPSTORE_ISSUER_ID,
            aud: 'appstoreconnect-v1',
            exp: Math.floor(Date.now() / 1000) + 600
          };
          const signingInput = `${base64url(JSON.stringify(header))}.${base64url(JSON.stringify(payload))}`;
          const key = Buffer.from(process.env.APPSTORE_PRIVATE_KEY_BASE64, 'base64').toString('utf8');
          const signature = crypto.sign('SHA256', Buffer.from(signingInput), {
            key,
            dsaEncoding: 'ieee-p1363'
          });
          const token = `${signingInput}.${base64url(signature)}`;

          fetch(`https://api.appstoreconnect.apple.com/v1/profiles/${process.env.APPSTORE_PROFILE_ID}`, {
            headers: { Authorization: `Bearer ${token}` }
          })
            .then(async response => {
              const payload = await response.json();
              if (!response.ok) throw new Error(JSON.stringify(payload));
              fs.writeFileSync(process.env.PROFILE_PATH, Buffer.from(payload.data.attributes.profileContent, 'base64'));
            })
            .catch(error => {
              console.error(error);
              process.exit(1);
            });
          NODE

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$IOS_DISTRIBUTION_P12_PASSWORD" -f pkcs12 -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" -o "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$RUNNER_TEMP/profile.plist")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          {
            echo "PROFILE_UUID=$PROFILE_UUID"
            echo "PROFILE_NAME=$PROFILE_NAME"
          } >> "$GITHUB_ENV"

      - name: Archive local alert app
        run: |
          set -o pipefail
          cd apps/mobile/ios
          xcodebuild -resolvePackageDependencies \
            -workspace app.xcworkspace \
            -scheme app
          xcodebuild archive \
            -workspace app.xcworkspace \
            -scheme app \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$GITHUB_WORKSPACE/build/local-alert.xcarchive" \
            DEVELOPMENT_TEAM=7Q3USC33A5 \
            PRODUCT_BUNDLE_IDENTIFIER=app.yaojidecare.localalert \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CURRENT_PROJECT_VERSION=1 \
            MARKETING_VERSION=1.0 \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-local-alert-archive.log"

      - name: Export IPA
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>7Q3USC33A5</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.yaojidecare.localalert</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$GITHUB_WORKSPACE/build/local-alert.xcarchive" \
            -exportPath "$GITHUB_WORKSPACE/build" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist"
          ls -lh build/*.ipa

      - name: Save IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-alert-ios-ipa
          path: build/*.ipa
          retention-days: 30

      - name: Upload IPA to App Store Connect
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          : "${APPSTORE_KEY_ID:?Missing APPSTORE_KEY_ID secret}"
          : "${APPSTORE_ISSUER_ID:?Missing APPSTORE_ISSUER_ID secret}"
          : "${APPSTORE_PRIVATE_KEY_BASE64:?Missing APPSTORE_PRIVATE_KEY_BASE64 secret}"

          mkdir -p "$HOME/private_keys"
          echo "$APPSTORE_PRIVATE_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"

          IPA_PATH="$(find "$GITHUB_WORKSPACE/build" -maxdepth 1 -name '*.ipa' -print -quit)"
          test -n "$IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"
