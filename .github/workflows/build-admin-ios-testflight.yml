name: Build Admin iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Admin app build number
        required: false
        default: '1'
  push:
    paths:
      - 'trigger-admin-build.txt'

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Prepare admin web bundle
        env:
          ADMIN_APP_BOOTSTRAP_TOKEN: ${{ secrets.ADMIN_APP_BOOTSTRAP_TOKEN }}
        run: |
          set -euo pipefail
          : "${ADMIN_APP_BOOTSTRAP_TOKEN:?Missing ADMIN_APP_BOOTSTRAP_TOKEN secret}"
          npx cap sync ios
          rm -rf ios/App/App/public
          mkdir -p ios/App/App/public
          cp -R admin-app/. ios/App/App/public/
          node <<'NODE'
          const fs = require('fs');
          const token = process.env.ADMIN_APP_BOOTSTRAP_TOKEN || '';
          const config = `window.ADMIN_APP_CONFIG = {\n  apiBaseUrl: 'https://yaojidecare.app',\n  bootstrapToken: ${JSON.stringify(token)}\n};\n`;
          fs.writeFileSync('ios/App/App/public/config.js', config);
          NODE
          node <<'NODE'
          const fs = require('fs');
          const projectPath = 'ios/App/App.xcodeproj/project.pbxproj';
          const project = fs.readFileSync(projectPath, 'utf8')
            .replace(/\n\s*CODE_SIGN_ENTITLEMENTS = App\/App\.entitlements;/g, '');
          fs.writeFileSync(projectPath, project);
          NODE
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 藥護家後台" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName YaojidecareAdmin" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Delete :GADApplicationIdentifier" ios/App/App/Info.plist || true

      - name: Install Apple signing assets
        env:
          IOS_DISTRIBUTION_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
          IOS_DISTRIBUTION_P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
          ADMIN_IOS_APPSTORE_PROFILE_BASE64: ${{ secrets.ADMIN_IOS_APPSTORE_PROFILE_BASE64 }}
          ADMIN_APPSTORE_PROFILE_ID: ${{ secrets.ADMIN_APPSTORE_PROFILE_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          : "${IOS_DISTRIBUTION_P12_BASE64:?Missing IOS_DISTRIBUTION_P12_BASE64 secret}"
          : "${IOS_DISTRIBUTION_P12_PASSWORD:?Missing IOS_DISTRIBUTION_P12_PASSWORD secret}"

          ADMIN_APPSTORE_PROFILE_ID="${ADMIN_APPSTORE_PROFILE_ID:-4SHSJ2J38T}"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-ci-keychain-password}"
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/admin-appstore.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/admin-app-signing.keychain-db"

          echo "$IOS_DISTRIBUTION_P12_BASE64" | base64 --decode > "$CERT_PATH"
          if [ -n "${ADMIN_APPSTORE_PROFILE_ID:-}" ]; then
            : "${APPSTORE_KEY_ID:?Missing APPSTORE_KEY_ID secret}"
            : "${APPSTORE_ISSUER_ID:?Missing APPSTORE_ISSUER_ID secret}"
            : "${APPSTORE_PRIVATE_KEY_BASE64:?Missing APPSTORE_PRIVATE_KEY_BASE64 secret}"
            export PROFILE_PATH
            node <<'NODE'
          const fs = require('fs');
          const jwt = require('jsonwebtoken');
          const key = Buffer.from(process.env.APPSTORE_PRIVATE_KEY_BASE64, 'base64').toString('utf8');
          const token = jwt.sign(
            {
              iss: process.env.APPSTORE_ISSUER_ID,
              aud: 'appstoreconnect-v1',
              exp: Math.floor(Date.now() / 1000) + 600
            },
            key,
            { algorithm: 'ES256', header: { kid: process.env.APPSTORE_KEY_ID, typ: 'JWT' } }
          );

          fetch(`https://api.appstoreconnect.apple.com/v1/profiles/${process.env.ADMIN_APPSTORE_PROFILE_ID}`, {
            headers: { Authorization: `Bearer ${token}` }
          })
            .then(async response => {
              const payload = await response.json();
              if (!response.ok) throw new Error(JSON.stringify(payload));
              fs.writeFileSync(process.env.PROFILE_PATH, Buffer.from(payload.data.attributes.profileContent, 'base64'));
            })
            .catch(error => {
              console.error(error);
              process.exit(1);
            });
          NODE
          else
            : "${ADMIN_IOS_APPSTORE_PROFILE_BASE64:?Missing ADMIN_IOS_APPSTORE_PROFILE_BASE64 or ADMIN_APPSTORE_PROFILE_ID secret}"
            echo "$ADMIN_IOS_APPSTORE_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$IOS_DISTRIBUTION_P12_PASSWORD" -f pkcs12 -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" -o "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$RUNNER_TEMP/profile.plist")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          {
            echo "PROFILE_UUID=$PROFILE_UUID"
            echo "PROFILE_NAME=$PROFILE_NAME"
          } >> "$GITHUB_ENV"

      - name: Archive admin app
        env:
          BUILD_NUMBER: ${{ github.event.inputs.build_number || '1' }}
        run: |
          set -o pipefail
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$GITHUB_WORKSPACE/build/yaojidecare-admin.xcarchive" \
            PRODUCT_BUNDLE_IDENTIFIER=app.yaojidecare.admin \
            PRODUCT_NAME=YaojidecareAdmin \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER:-1}" \
            MARKETING_VERSION=1.0 \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-admin-archive.log"

      - name: Export admin IPA
        run: |
          set -ex
          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>7Q3USC33A5</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.yaojidecare.admin</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$GITHUB_WORKSPACE/build/yaojidecare-admin.xcarchive" \
            -exportPath "$GITHUB_WORKSPACE/build" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist"
          ls -lh build/*.ipa

      - name: Save admin IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaojidecare-admin-ios-ipa
          path: build/*.ipa
          retention-days: 30

      - name: Upload admin IPA to App Store Connect
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          : "${APPSTORE_KEY_ID:?Missing APPSTORE_KEY_ID secret}"
          : "${APPSTORE_ISSUER_ID:?Missing APPSTORE_ISSUER_ID secret}"
          : "${APPSTORE_PRIVATE_KEY_BASE64:?Missing APPSTORE_PRIVATE_KEY_BASE64 secret}"

          mkdir -p "$HOME/private_keys"
          echo "$APPSTORE_PRIVATE_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"

          IPA_PATH="$(find "$GITHUB_WORKSPACE/build" -maxdepth 1 -name '*.ipa' -print -quit)"
          test -n "$IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"
