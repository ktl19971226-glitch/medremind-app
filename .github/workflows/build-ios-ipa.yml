name: Build iOS IPA

on:
  push:
    paths:
      - 'trigger-build.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        run: git clone --depth 1 https://github.com/ktl19971226-glitch/medremind-app.git .

      - name: Setup
        run: |
          set -ex
          node --version
          npm --version
          npm install
          npx cap sync ios 2>&1
  
      - name: Signing
        run: |
          set -ex
          echo "" | base64 -d > signing.p12
          echo "" | base64 -d > signing.mobileprovision
          security create-keychain -p temp temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p temp temp.keychain
          security import signing.p12 -k temp.keychain -P "00000000" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k temp temp.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp signing.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build
        run: |
          set -ex
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build/medremind.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=N7T77R4X9X \
            -allowProvisioningUpdates

      - name: Export
        run: |
          set -ex
          ls -la $GITHUB_WORKSPACE/build/
          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/medremind.xcarchive \
            -exportPath $GITHUB_WORKSPACE/build \
            -exportOptionsPlist exportOptions.plist

      - name: Artifact
        run: |
          find build -name "*.ipa" -exec cp {} medremind.ipa \;
          ls -lh medremind.ipa
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: medremind-ipa
          path: medremind.ipa
          retention-days: 30
