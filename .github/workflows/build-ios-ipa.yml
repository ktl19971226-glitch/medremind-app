name: Build iOS IPA

on:
  push:
    paths:
      - 'trigger-build.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout
        run: git clone --depth 1 https://x-access-token:***}@github.com/ktl19971226-glitch/medremind-app.git .

      - name: Setup
        run: |
          set -ex
          node --version
          npm install
          npx cap sync ios

      - name: Signing
        run: |
          set -ex
          echo "" | base64 -d > signing.p12
          echo "" | base64 -d > signing.mobileprovision
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p temp "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p temp "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          # Empty-password p12 still needs -P "" in CI, otherwise security import waits for input forever.
          perl -e 'alarm shift; exec @ARGV' 90 security import signing.p12 -k "$KEYCHAIN_PATH" -P "" -f pkcs12 -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild 2>&1
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp signing.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "✓ Signing ready"

      - name: Build
        run: |
          set -ex
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build/medremind.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=7Q3USC33A5 \
            -allowProvisioningUpdates

      - name: Export
        run: |
          set -ex
          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/medremind.xcarchive \
            -exportPath $GITHUB_WORKSPACE/build \
            -exportOptionsPlist exportOptions.plist

      - name: Upload
        run: |
          ls -lh build/*.ipa
          cp build/*.ipa medremind.ipa
        
      - uses: actions/upload-artifact@v4
        with:
          name: medremind-ipa
          path: medremind.ipa
          retention-days: 30
