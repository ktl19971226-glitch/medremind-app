name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - run: npm install
      - run: npx cap add ios
      - run: npx cap sync ios
      - run: cd ios/App && pod install
      - run: |
          cd ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ./build/medremind.xcarchive
      
      - uses: actions/upload-artifact@v3
        with:
          name: ios-build
          path: ios/App/build/
