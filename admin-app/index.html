<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藥護家後台</title>
  <style>
    :root {
      --green: #27AE60; --blue: #3498DB; --red: #E74C3C; --orange: #F39C12;
      --bg: #f5f7fa; --card-bg: #ffffff; --text: #2c3e50; --text-light: #7f8c8d; --border: #e0e6ed;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6;
    }
    .header {
      background: var(--green); color: white; padding: 14px 20px; display: flex;
      align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .header h1 { font-size: 20px; }
    .header button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    .container { max-width: 1120px; margin: 0 auto; padding: 20px 16px 60px; }
    .login-box { max-width: 400px; margin: 80px auto; padding: 32px 24px; background: white; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .login-box h2 { text-align: center; margin-bottom: 24px; color: var(--green); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
    .form-group input { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; }
    .btn { padding: 10px 20px; border-radius: 10px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; }
    .btn-primary { background: var(--green); color: white; width: 100%; }
    .btn-danger { background: var(--red); color: white; }
    .btn-outline { background: white; border: 2px solid var(--green); color: var(--green); }
    .btn-sm { padding: 5px 12px; font-size: 12px; width: auto; }
    .select-cell { width: 38px; text-align: center; }
    .select-cell input { width: 18px; height: 18px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 24px; }
    .stat-card { background: var(--card-bg); border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: default; }
    .stat-value { font-size: 26px; font-weight: 700; color: var(--green); }
    .stat-label { font-size: 13px; color: var(--text-light); margin-top: 2px; }
    .card { background: var(--card-bg); border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .toolbar { display: grid; grid-template-columns: minmax(180px, 1fr) 150px 120px 120px; gap: 8px; margin-bottom: 12px; }
    .toolbar input, .toolbar select { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; background: white; }
    .mini-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; }
    .mini-row { display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; }
    .mini-row:last-child { border-bottom:none; }
    .risk-high { color: var(--red); font-weight: 700; }
    .risk-watch { color: #b45309; font-weight: 700; }
    .section-title { font-size: 18px; font-weight: 600; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; }
    table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    th { background: #e8f5e9; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 14px; }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-admin { background: #e8f5e9; color: var(--green); }
    .badge-user { background: #e3f2fd; color: var(--blue); }
    .badge-taken { background: #e8f5e9; color: var(--green); }
    .badge-missed { background: #fde8e8; color: var(--red); }
    .badge-ok { background: #e8f5e9; color: var(--green); }
    .badge-warn { background: #fff4e5; color: #b45309; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 10px; font-size: 14px; z-index: 200; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 150; display: flex; align-items: center; justify-content: center; }
    .modal { background: white; border-radius: 16px; padding: 24px; width: 93%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
    .modal h2 { margin-bottom: 16px; font-size: 20px; }
    .clickable { cursor: pointer; color: var(--blue); text-decoration: underline; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .info-label { color: var(--text-light); }
    @media (max-width: 760px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      table { min-width: 760px; }
      .container { overflow-x: hidden; }
    }
  </style>
</head>
<body>
<div id="login-page">
  <div class="login-box">
    <h2>藥護家後台</h2>
    <p id="boot-status" style="text-align:center;color:var(--text-light);">正在啟動後台...</p>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <div class="header">
    <h1>🔧 藥護家管理後台</h1>
    <div>
      <span id="admin-name" style="margin-right:12px;"></span>
      <button onclick="refreshAdminSession()">重新驗證</button>
    </div>
  </div>
  <div class="container">

    <div class="section-title">📊 系統摘要</div>
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-value" id="s-users">-</div><div class="stat-label">總用戶數</div></div>
      <div class="stat-card"><div class="stat-value" id="s-meds">-</div><div class="stat-label">總用藥筆數</div></div>
      <div class="stat-card"><div class="stat-value" id="s-logs">-</div><div class="stat-label">今日服藥紀錄</div></div>
      <div class="stat-card"><div class="stat-value" id="s-adh">-</div><div class="stat-label">今日遵從率</div></div>
      <div class="stat-card"><div class="stat-value" id="s-health">-</div><div class="stat-label">健康數據</div></div>
    </div>

    <div class="section-title">📈 用戶成長與營運狀態</div>
    <div class="mini-grid" style="margin-bottom:16px;">
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:8px;">用戶漏斗</h3>
        <div id="growth-summary"></div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:8px;">今日待關注</h3>
        <div id="ops-summary"></div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;margin-bottom:8px;">風險用戶</h3>
        <div id="attention-list"></div>
      </div>
    </div>

    <!-- 管理員分析面板 -->
    <div class="section-title">📊 近7天分析</div>
    <div class="card" style="margin-bottom:16px;">
        <canvas id="admin-trend-chart" width="700" height="180" style="width:100%;height:180px;border-radius:8px;background:#f9fafb;"></canvas>
    </div>
    <div class="card" style="margin-bottom:16px;">
        <h3 style="margin-bottom:8px;">⚠️ 低遵從用戶（近7天 <50%）</h3>
        <div id="at-risk-list" style="font-size:14px;"></div>
    </div>

    <div class="section-title">🔔 原生通知 / 推播</div>
    <div class="stats-grid" id="push-stats-grid">
      <div class="stat-card"><div class="stat-value" id="p-total">-</div><div class="stat-label">註冊裝置</div></div>
      <div class="stat-card"><div class="stat-value" id="p-enabled">-</div><div class="stat-label">啟用裝置</div></div>
      <div class="stat-card"><div class="stat-value" id="p-ios">-</div><div class="stat-label">iOS</div></div>
      <div class="stat-card"><div class="stat-value" id="p-android">-</div><div class="stat-label">Android</div></div>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <div id="push-config-status" style="font-size:14px;margin-bottom:12px;color:var(--text-light);">載入推播設定中...</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
        <div class="form-group" style="margin-bottom:0;">
          <label>測試用戶 ID</label>
          <input type="number" id="push-test-user-id" placeholder="例如 3">
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>測試標題</label>
          <input type="text" id="push-test-title" value="藥護家後台測試通知">
        </div>
      </div>
      <div class="form-group">
        <label>測試內容</label>
        <input type="text" id="push-test-body" value="這是一則由管理後台發出的原生推播測試。">
      </div>
      <div class="form-group">
        <label>已選收件人</label>
        <div id="push-selected-users" style="min-height:44px;padding:10px 12px;border:2px solid var(--border);border-radius:10px;background:#fbfcfd;color:var(--text-light);font-size:14px;">尚未選擇用戶</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-outline" style="width:auto;" onclick="loadPushAdmin()">重新整理</button>
        <button class="btn btn-outline" style="width:auto;" onclick="clearSelectedPushUsers()">清空收件人</button>
        <button class="btn btn-primary" style="width:auto;" onclick="sendAdminPushTest()">發送推播</button>
      </div>
      <div style="margin-top:14px;overflow-x:auto;">
        <table>
          <thead><tr><th>用戶</th><th>平台</th><th>狀態</th><th>Token 尾碼</th><th>最後註冊</th></tr></thead>
          <tbody id="push-devices-table"><tr><td colspan="5" style="text-align:center;color:var(--text-light);">載入中...</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="section-title">👥 用戶列表</div>
    <div class="toolbar">
      <input id="user-search" type="search" placeholder="搜尋姓名 / Email / 手機 / 用戶碼">
      <select id="user-status">
        <option value="all">全部帳號</option>
        <option value="users">一般用戶</option>
        <option value="pro">Pro 用戶</option>
        <option value="no_push">未註冊推播</option>
        <option value="unverified">Email 未驗證</option>
        <option value="admins">管理員</option>
      </select>
      <select id="user-limit">
        <option value="25">每頁 25</option>
        <option value="50" selected>每頁 50</option>
        <option value="100">每頁 100</option>
      </select>
      <button class="btn btn-outline" onclick="loadUsers(1)">搜尋</button>
    </div>
    <div id="user-pagination" style="font-size:13px;color:var(--text-light);margin-bottom:8px;"></div>
    <div style="overflow-x:auto;">
    <table>
      <thead><tr><th class="select-cell"><input type="checkbox" id="select-page-users" onchange="toggleCurrentPageUsers(this.checked)" title="選取本頁"></th><th>姓名</th><th>Email</th><th>狀態</th><th>用藥</th><th>7日遵從</th><th>推播</th><th>通知</th><th>註冊日</th><th>操作</th></tr></thead>
      <tbody id="users-table"><tr><td colspan="10" style="text-align:center;color:var(--text-light);">載入中...</td></tr></tbody>
    </table>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="./config.js"></script>
<script>
const ADMIN_APP_CONFIG = window.ADMIN_APP_CONFIG || {};
const API_URL = (ADMIN_APP_CONFIG.apiBaseUrl || 'https://yaojidecare.app').replace(/\/+$/, '');
let token = '';
let booting = false;
let usersPage = 1;
const selectedPushUsers = new Map();
let currentPageUserIds = [];

function showToast(msg, dur = 2000) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), dur);
}

async function api(url, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  try {
    const res = await fetch(API_URL + url, { ...opts, headers });
    if (res.status === 401 || res.status === 403) {
      token = '';
      showBootStatus('後台驗證已失效，請重新開啟 App 或按重新驗證。');
      document.getElementById('login-page').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }
    let data = {};
    try {
      data = await res.json();
    } catch (jsonErr) {
      console.error('JSON parse error:', jsonErr);
      data = { error: '伺服器回應格式錯誤' };
    }
    return { status: res.status, data };
  } catch (fetchErr) {
    console.error('API request error:', fetchErr);
    return { status: 0, data: { error: '網路連線失敗：' + fetchErr.message } };
  }
}

function escapeHTML(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showBootStatus(message) {
  const el = document.getElementById('boot-status');
  if (el) el.textContent = message;
}

async function refreshAdminSession() {
  token = '';
  await bootAdminApp();
}

async function bootAdminApp() {
  if (booting) return;
  booting = true;
  document.getElementById('login-page').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  showBootStatus('正在驗證後台 App...');
  const bootstrapToken = String(ADMIN_APP_CONFIG.bootstrapToken || '').trim();
  if (!bootstrapToken) {
    booting = false;
    showBootStatus('後台 App 憑證尚未設定，請重新打包 TestFlight。');
    return;
  }
  const { status, data } = await api('/api/admin/app-session', {
    method: 'POST',
    headers: { 'X-Admin-App-Token': bootstrapToken },
    body: JSON.stringify({ app: 'yaojidecare-admin-ios' })
  });
  booting = false;
  if (status !== 200 || !data.token || !data.user) {
    showBootStatus(data.error || '後台 App 驗證失敗');
    return;
  }
  token = data.token;
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('admin-name').textContent = data.user.name;
  loadDashboard();
}

function doLogout() {
  token = '';
  document.getElementById('login-page').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  showBootStatus('後台驗證已清除，請按重新驗證。');
}

document.addEventListener('DOMContentLoaded', bootAdminApp);
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('user-search')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') loadUsers(1);
  });
  document.getElementById('user-status')?.addEventListener('change', () => loadUsers(1));
  document.getElementById('user-limit')?.addEventListener('change', () => loadUsers(1));
});

async function loadDashboard() {
  // 系統摘要
  const { data: stats } = await api('/api/admin/stats');
  if (stats) {
    document.getElementById('s-users').textContent = stats.totalUsers;
    document.getElementById('s-meds').textContent = stats.totalMeds;
    document.getElementById('s-logs').textContent = stats.todayLogs;
    document.getElementById('s-adh').textContent = stats.todayAdherence + '%';
    document.getElementById('s-health').textContent = stats.healthRecords;
  }
  loadOverview();
  // 載入分析面板
  loadAnalytics();
  loadPushAdmin();
  loadUsers(1);
}

async function deleteUser(id, name) {
  if (!confirm('確定要永久刪除「' + name + '」及其所有用藥、健康、家庭資料？此操作無法復原。')) return;
  const { status, data } = await api('/api/admin/users/' + id, { method: 'DELETE' });
  if (status === 200) { showToast('用戶已刪除'); loadDashboard(); }
  else showToast(data.error || '刪除失敗');
}

function pushCountByPlatform(counts, platform) {
  const row = (counts || []).find(c => c.platform === platform);
  return row ? Number(row.enabled || row.total || 0) : 0;
}

function formatDateTime(value) {
  if (!value) return '-';
  return String(value).replace('T', ' ').replace(/\.\d+Z?$/, '').slice(0, 16);
}

function formatDate(value) {
  if (!value) return '-';
  return String(value).split('T')[0].slice(0, 10);
}

function badge(text, type = 'user') {
  const cls = type === 'ok' ? 'badge-ok'
    : type === 'warn' ? 'badge-warn'
    : type === 'admin' ? 'badge-admin'
    : type === 'danger' ? 'badge-missed'
    : 'badge-user';
  return `<span class="badge ${cls}">${escapeHTML(text)}</span>`;
}

function updateSelectedPushUsers() {
  const box = document.getElementById('push-selected-users');
  if (!box) return;
  const values = [...selectedPushUsers.values()];
  if (!values.length) {
    box.textContent = '尚未選擇用戶';
    box.style.color = 'var(--text-light)';
  } else {
    box.style.color = 'var(--text)';
    box.innerHTML = `${values.length} 位：` + values.slice(0, 8).map(u => `${escapeHTML(u.name || '未命名')} <span style="color:var(--text-light);">#${Number(u.id)}</span>`).join('、') + (values.length > 8 ? ` 等 ${values.length} 位` : '');
  }
  document.querySelectorAll('.push-user-checkbox').forEach(cb => {
    cb.checked = selectedPushUsers.has(Number(cb.value));
  });
  const pageBox = document.getElementById('select-page-users');
  if (pageBox) pageBox.checked = currentPageUserIds.length > 0 && currentPageUserIds.every(id => selectedPushUsers.has(id));
}

function setSelectedPushUser(id, name, checked) {
  const uid = Number(id || 0);
  if (!uid) return;
  if (checked) selectedPushUsers.set(uid, { id: uid, name: name || '未命名' });
  else selectedPushUsers.delete(uid);
  updateSelectedPushUsers();
}

function toggleCurrentPageUsers(checked) {
  currentPageUserIds.forEach(id => {
    const cb = document.querySelector(`.push-user-checkbox[value="${id}"]`);
    if (cb) setSelectedPushUser(id, cb.dataset.name || '未命名', checked);
  });
}

function clearSelectedPushUsers() {
  selectedPushUsers.clear();
  updateSelectedPushUsers();
}

function miniRow(label, value) {
  return `<div class="mini-row"><span>${escapeHTML(label)}</span><strong>${value}</strong></div>`;
}

async function loadOverview() {
  const { status, data } = await api('/api/admin/overview');
  if (status !== 200) return;
  const s = data.summary || {};
  document.getElementById('growth-summary').innerHTML = [
    miniRow('總一般用戶', Number(s.totalUsers || 0)),
    miniRow('今日新增', Number(s.newToday || 0)),
    miniRow('近7天新增', Number(s.new7 || 0)),
    miniRow('Email 已驗證', `${Number(s.emailVerified || 0)} / ${Number(s.totalUsers || 0)}`),
    miniRow('裝置快速帳號', Number(s.deviceAccounts || 0))
  ].join('');
  document.getElementById('ops-summary').innerHTML = [
    miniRow('近7天活躍', Number(s.active7 || 0)),
    miniRow('近30天活躍', Number(s.active30 || 0)),
    miniRow('Pro 用戶', Number(s.proUsers || 0)),
    miniRow('有推播裝置', Number(s.pushUsers || 0)),
    miniRow('今日遵從率', `${Number(s.todayAdherence || 0)}%`),
    miniRow('未讀通知', Number(s.unreadNotifications || 0)),
    miniRow('低庫存用藥', Number(s.lowStock || 0)),
    miniRow('已過期仍啟用用藥', Number(s.expiredMeds || 0))
  ].join('');
  const attention = data.attention || [];
  document.getElementById('attention-list').innerHTML = attention.length ? attention.slice(0, 8).map(u => {
    const cls = u.risk === 'high' ? 'risk-high' : 'risk-watch';
    return `<div class="mini-row"><span><span class="${cls}">●</span> <span class="clickable" onclick="showUserDetail(${Number(u.id)})">${escapeHTML(u.name || '未命名')}</span></span><span>${escapeHTML((u.riskReasons || []).join('、') || '需追蹤')}</span></div>`;
  }).join('') : '<div style="color:var(--green);font-size:14px;">目前沒有高風險用戶</div>';
}

function renderUserStatus(u) {
  const tags = [];
  tags.push(u.role === 'admin' ? badge('管理員', 'admin') : badge('使用者', 'user'));
  if (Number(u.is_pro || 0) === 1) tags.push(badge('Pro', 'ok'));
  if (Number(u.email_verified || 0) !== 1 && u.email) tags.push(badge('未驗證', 'warn'));
  if (u.account_code) tags.push(`<div style="font-size:12px;color:var(--text-light);margin-top:3px;">${escapeHTML(u.account_code)}</div>`);
  return tags.join(' ');
}

function renderAdherence(u) {
  const a = u.week_adherence || {};
  if (!a.total) return '<span style="color:var(--text-light);">尚無紀錄</span>';
  const type = a.rate < 50 ? 'danger' : a.rate < 75 ? 'warn' : 'ok';
  return `${badge(a.rate + '%', type)}<div style="font-size:12px;color:var(--text-light);">${Number(a.taken || 0)}/${Number(a.total || 0)} 次</div>`;
}

function renderUserRow(u) {
  const safeName = escapeHTML(u.name || '未命名');
  const safeEmail = escapeHTML(u.email || '-');
  const id = Number(u.id || 0);
  const actionName = safeName.replace(/'/g, '&#39;');
  const canSelect = u.role !== 'admin';
  const actions = u.role !== 'admin'
    ? `<button onclick="deleteUser(${id},'${actionName}')" class="btn btn-danger btn-sm" style="margin-right:4px;">刪除</button><button onclick="showResetPassword(${id},'${actionName}')" class="btn btn-outline btn-sm" style="margin-right:4px;">改密</button><button onclick="exportUserCSV(${id},'${actionName}')" class="btn btn-outline btn-sm">匯出</button>`
    : '-';
  return `
    <tr>
      <td class="select-cell">${canSelect ? `<input type="checkbox" class="push-user-checkbox" value="${id}" data-name="${safeName}" onchange="setSelectedPushUser(${id}, this.dataset.name, this.checked)" ${selectedPushUsers.has(id) ? 'checked' : ''}>` : ''}</td>
      <td><span class="clickable" onclick="showUserDetail(${id})">${safeName}</span><div style="font-size:12px;color:var(--text-light);">ID ${id}</div></td>
      <td>${safeEmail}</td>
      <td>${renderUserStatus(u)}</td>
      <td>${Number(u.med_count || 0)}</td>
      <td>${renderAdherence(u)}</td>
      <td>${Number(u.push_count || 0) ? badge(Number(u.push_count || 0) + ' 台', 'ok') : badge('無裝置', 'warn')}</td>
      <td>${Number(u.unread_notifications || 0) ? badge(Number(u.unread_notifications || 0) + ' 未讀', 'warn') : '-'}</td>
      <td>${formatDate(u.created_at)}</td>
      <td>${actions}</td>
    </tr>
  `;
}

async function loadUsers(page = usersPage) {
  usersPage = page;
  const q = encodeURIComponent(document.getElementById('user-search')?.value || '');
  const status = encodeURIComponent(document.getElementById('user-status')?.value || 'all');
  const limit = encodeURIComponent(document.getElementById('user-limit')?.value || '50');
  document.getElementById('users-table').innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--text-light);">載入中...</td></tr>';
  const { status: httpStatus, data } = await api(`/api/admin/users?q=${q}&status=${status}&limit=${limit}&page=${page}`);
  if (httpStatus !== 200 || !data.users) {
    document.getElementById('users-table').innerHTML = `<tr><td colspan="10" style="text-align:center;color:var(--red);">${escapeHTML(data.error || '載入用戶失敗')}</td></tr>`;
    return;
  }
  currentPageUserIds = (data.users || []).filter(u => u.role !== 'admin').map(u => Number(u.id || 0)).filter(Boolean);
  document.getElementById('users-table').innerHTML = data.users.length
    ? data.users.map(renderUserRow).join('')
    : '<tr><td colspan="10" style="text-align:center;color:var(--text-light);">沒有符合條件的用戶</td></tr>';
  const p = data.pagination || { page: 1, totalPages: 1, total: data.users.length };
  const prevDisabled = p.page <= 1 ? 'disabled' : '';
  const nextDisabled = p.page >= p.totalPages ? 'disabled' : '';
  document.getElementById('user-pagination').innerHTML = `
    共 ${Number(p.total || 0)} 筆，第 ${Number(p.page || 1)} / ${Number(p.totalPages || 1)} 頁
    <button class="btn btn-outline btn-sm" ${prevDisabled} onclick="loadUsers(${Number(p.page || 1) - 1})">上一頁</button>
    <button class="btn btn-outline btn-sm" ${nextDisabled} onclick="loadUsers(${Number(p.page || 1) + 1})">下一頁</button>
  `;
  updateSelectedPushUsers();
}

function renderPushConfig(config) {
  const firebase = config?.firebase || {};
  const apns = config?.apns || {};
  const fBadge = firebase.configured
    ? '<span class="badge badge-ok">FCM 已設定</span>'
    : '<span class="badge badge-warn">FCM 未設定</span>';
  const aBadge = apns.configured
    ? '<span class="badge badge-ok">APNs 已設定</span>'
    : '<span class="badge badge-warn">APNs 未設定</span>';
  const parts = [
    fBadge + ' ' + (firebase.project_id ? 'Project: ' + escapeHTML(firebase.project_id) : '需補 Firebase service account'),
    aBadge + ' ' + 'Bundle: ' + escapeHTML(apns.bundle_id || '-') + ' / Env: ' + escapeHTML(apns.env || '-')
  ];
  return parts.join('<br>');
}

async function loadPushAdmin() {
  const { status, data } = await api('/api/admin/push/status');
  if (status !== 200) {
    document.getElementById('push-config-status').textContent = data.error || '推播狀態載入失敗';
    return;
  }
  document.getElementById('p-total').textContent = data.totals?.total ?? 0;
  document.getElementById('p-enabled').textContent = data.totals?.enabled ?? 0;
  document.getElementById('p-ios').textContent = pushCountByPlatform(data.counts, 'ios');
  document.getElementById('p-android').textContent = pushCountByPlatform(data.counts, 'android');
  document.getElementById('push-config-status').innerHTML = renderPushConfig(data.config);

  const rows = data.recent || [];
  document.getElementById('push-devices-table').innerHTML = rows.length ? rows.map(row => `
    <tr>
      <td>
        <span class="clickable" data-name="${escapeHTML(row.name || '未命名')}" onclick="setSelectedPushUser(${Number(row.user_id || 0)}, this.dataset.name, true)">${escapeHTML(row.name || '未命名')}</span>
        <div style="font-size:12px;color:var(--text-light);">ID ${Number(row.user_id || 0)} ${row.email ? '· ' + escapeHTML(row.email) : ''}</div>
      </td>
      <td>${escapeHTML(row.platform || 'unknown')}</td>
      <td><span class="badge ${row.enabled ? 'badge-ok' : 'badge-warn'}">${row.enabled ? '啟用' : '停用'}</span></td>
      <td>...${escapeHTML(row.token_tail || '')}</td>
      <td>${formatDateTime(row.last_seen_at || row.created_at)}</td>
    </tr>
  `).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-light);">尚無已註冊裝置</td></tr>';
}

async function sendAdminPushTest() {
  const typedUserId = parseInt(document.getElementById('push-test-user-id').value, 10);
  const userIds = [...selectedPushUsers.keys()];
  if (typedUserId && !userIds.includes(typedUserId)) userIds.push(typedUserId);
  const title = document.getElementById('push-test-title').value.trim();
  const body = document.getElementById('push-test-body').value.trim();
  if (!userIds.length) return showToast('請先勾選用戶，或輸入測試用戶 ID');
  if (!confirm('確定要發送推播/站內通知給 ' + userIds.length + ' 位用戶？')) return;
  const { status, data } = await api('/api/admin/push/test', {
    method: 'POST',
    body: JSON.stringify({ user_ids: userIds, title, body })
  });
  if (status === 200) {
    const sent = data.result?.sent || 0;
    const skipped = data.result?.skipped || 0;
    const noTokenUsers = data.result?.no_token_users || 0;
    const detail = `原生推播送出 ${sent}，無 token 用戶 ${noTokenUsers}，略過 ${skipped}`;
    showToast((data.message || '測試完成') + `（${detail}）`, 5000);
    loadPushAdmin();
    loadUsers(usersPage);
  } else {
    showToast(data.error || '測試推播失敗');
  }
}

// 管理員重設密碼
function showResetPassword(uid, name) {
  const newPwd = prompt('為「' + name + '」重設密碼：\n請輸入新密碼（至少6位）：');
  if (!newPwd) return;
  if (newPwd.length < 6) return showToast('密碼至少6位');
  api('/api/admin/users/' + uid + '/reset-password', { method: 'PUT', body: JSON.stringify({ newPassword: newPwd }) }).then(({ status, data }) => {
    if (status === 200) showToast(name + ' 密碼已重設為：' + (data.newPassword || newPwd));
    else showToast(data.error || '重設失敗');
  });
}

// 管理員匯出 CSV
function exportUserCSV(uid, name) {
  const tok = token;
  // 用 fetch 加 auth header 下載
  fetch(API_URL + '/api/admin/users/' + uid + '/export', { headers: { 'Authorization': 'Bearer ' + tok } }).then(res => {
    if (!res.ok) return showToast('匯出失敗');
    return res.blob();
  }).then(blob => {
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const dl = document.createElement('a'); dl.href = url; dl.download = name + '_export.csv'; dl.click();
    URL.revokeObjectURL(url);
    showToast(name + ' 資料已匯出');
  }).catch(() => showToast('匯出失敗'));
}

// 管理員分析面板
async function loadAnalytics() {
    const { status, data } = await api('/api/admin/analytics');
    if (status !== 200) return;
    
    // 趨勢圖
    const canvas = document.getElementById('admin-trend-chart');
    if (canvas && data.dailyStats && data.dailyStats.length > 1) {
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        const pad = { top: 25, right: 20, bottom: 25, left: 40 };
        const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
        const vals = data.dailyStats.map(s => s.adherenceRate);
        const max = 100, min = Math.max(0, Math.min(...vals) - 10);
        for (let i = 0; i <= 4; i++) {
            const y = pad.top + ch * i / 4;
            ctx.strokeStyle = '#e0e6ed'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
            ctx.fillStyle = '#7f8c8d'; ctx.font = '14px sans-serif'; ctx.textAlign = 'right';
            ctx.fillText(Math.round(max - (max - min) * i / 4) + '%', pad.left - 6, y + 4);
        }
        ctx.strokeStyle = '#27AE60'; ctx.lineWidth = 3; ctx.lineJoin = 'round'; ctx.beginPath();
        data.dailyStats.forEach((s, i) => {
            const x = pad.left + cw * i / (data.dailyStats.length - 1);
            const y = pad.top + ch - ((s.adherenceRate - min) / (max - min)) * ch;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
        data.dailyStats.forEach((s, i) => {
            const x = pad.left + cw * i / (data.dailyStats.length - 1);
            const y = pad.top + ch - ((s.adherenceRate - min) / (max - min)) * ch;
            ctx.fillStyle = '#27AE60'; ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
        });
        // 日期標籤
        ctx.fillStyle = '#7f8c8d'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
        data.dailyStats.forEach((s, i) => {
            if (i % 2 === 0 || i === data.dailyStats.length - 1) {
                const x = pad.left + cw * i / (data.dailyStats.length - 1);
                ctx.fillText(s.date.substring(5), x, H - 5);
            }
        });
    }

    // 低遵從用戶
    if (data.atRisk && data.atRisk.length > 0) {
        document.getElementById('at-risk-list').innerHTML = data.atRisk.map(u =>
            '<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;">' +
            '<span>👤 <b>' + u.name + '</b></span><span style="color:var(--red);">' + u.rate + '% (' + u.total + '次)</span></div>'
        ).join('');
    } else {
        document.getElementById('at-risk-list').innerHTML = '<div style="color:var(--green);text-align:center;padding:8px;">✅ 所有用戶遵從率正常</div>';
    }
}
