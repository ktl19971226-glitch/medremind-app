<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fffaf5" />
    <title>小約</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #fffaf5;
        --surface: #ffffff;
        --ink: #241f21;
        --muted: #746864;
        --line: #eadfd8;
        --brand: #d94435;
        --brand-dark: #ae3128;
        --mint: #2f8a73;
        --blue: #385f9f;
        --gold: #a66b16;
        --shadow: 0 18px 48px rgba(45, 31, 24, 0.12);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--paper);
        color: var(--ink);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(180deg, #fffaf5 0%, #fff3ec 45%, #f8fbfa 100%);
      }

      body.intro-locked {
        position: fixed;
        inset: 0;
        width: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
        padding: max(18px, env(safe-area-inset-top)) 16px calc(92px + env(safe-area-inset-bottom));
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 2px auto 18px;
        max-width: 760px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .mark {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        background: var(--brand);
        color: white;
        font-size: 24px;
        font-weight: 800;
      }

      .brand h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .brand p,
      .section-note {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .icon-btn {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .screen,
      .landing,
      .login {
        max-width: 760px;
        margin: 0 auto;
      }

      .landing {
        height: 100vh;
        height: 100dvh;
        padding: max(22px, env(safe-area-inset-top)) 0 calc(24px + env(safe-area-inset-bottom));
        display: grid;
        overflow: hidden;
      }

      .hero {
        padding: 22px;
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .login {
        min-height: calc(100vh - 80px);
        display: grid;
        align-items: center;
      }

      .login .hero {
        width: 100%;
      }

      .hero h2,
      .section-title {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .intro-hero {
        min-height: 0;
        height: 100%;
        display: grid;
        align-content: space-between;
        gap: 18px;
        overflow: hidden;
        background:
          linear-gradient(160deg, rgba(217, 68, 53, 0.94), rgba(174, 49, 40, 0.9)),
          radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.35), transparent 34%);
        color: white;
      }

      .intro-hero .brand p,
      .intro-copy,
      .intro-proof {
        color: rgba(255, 255, 255, 0.82);
      }

      .intro-hero .mark {
        background: white;
        color: var(--brand);
      }

      .intro-kicker {
        margin: 26px 0 10px;
        font-size: 13px;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.78);
      }

      .intro-title {
        margin: 0;
        font-size: 34px;
        line-height: 1.12;
        letter-spacing: 0;
      }

      .intro-copy {
        margin: 14px 0 0;
        font-size: 16px;
        line-height: 1.65;
      }

      .intro-panel {
        display: grid;
        gap: 10px;
        padding: 14px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.14);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
      }

      .intro-item {
        display: grid;
        grid-template-columns: 34px 1fr;
        gap: 10px;
        align-items: start;
      }

      .intro-icon {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.18);
      }

      .intro-icon svg {
        width: 18px;
        height: 18px;
      }

      .intro-item b {
        display: block;
        font-size: 15px;
      }

      .intro-item span {
        display: block;
        margin-top: 3px;
        color: rgba(255, 255, 255, 0.76);
        font-size: 13px;
        line-height: 1.45;
      }

      .intro-actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .intro-actions .primary {
        margin-top: 0;
        background: white;
        color: var(--brand);
      }

      .intro-actions .secondary {
        background: rgba(255, 255, 255, 0.12);
        color: white;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.26);
      }

      .intro-proof {
        margin: 0;
        text-align: center;
        font-size: 12px;
      }

      .landing > .intro-proof {
        color: var(--muted);
      }

      .field {
        display: grid;
        gap: 7px;
        margin-top: 14px;
      }

      label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fffdfb;
        color: var(--ink);
        outline: none;
        padding: 12px 13px;
      }

      textarea {
        min-height: 86px;
        resize: vertical;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgba(217, 68, 53, 0.5);
        box-shadow: 0 0 0 3px rgba(217, 68, 53, 0.12);
      }

      .primary,
      .secondary,
      .danger {
        min-height: 44px;
        border-radius: 8px;
        padding: 0 14px;
        font-weight: 800;
      }

      .primary {
        width: 100%;
        margin-top: 18px;
        background: var(--brand);
        color: white;
      }

      .primary.inline-primary {
        width: auto;
        margin-top: 0;
      }

      .secondary {
        background: #ffffff;
        color: var(--ink);
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .danger {
        background: #fff0ee;
        color: var(--brand-dark);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .stat,
      .card {
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .stat {
        padding: 15px;
      }

      .stat b {
        display: block;
        font-size: 26px;
        line-height: 1;
      }

      .stat span,
      .meta {
        color: var(--muted);
        font-size: 13px;
      }

      .section {
        margin-top: 18px;
      }

      .section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .card {
        padding: 14px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .title {
        min-width: 0;
        font-size: 16px;
        font-weight: 800;
      }

      .title small {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 500;
      }

      .pill {
        border-radius: 999px;
        padding: 6px 9px;
        flex: 0 0 auto;
        background: #f5efe9;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .pill.confirmed {
        background: #eaf6f2;
        color: var(--mint);
      }

      .pill.cancelled {
        background: #fff0ee;
        color: var(--brand-dark);
      }

      .pill.completed {
        background: #edf3ff;
        color: var(--blue);
      }

      .pill.no_show {
        background: #fff5df;
        color: var(--gold);
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .today-actions {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .quick-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .quick-sale-card {
        margin-top: 12px;
      }

      .toolbar {
        display: grid;
        gap: 10px;
        margin-bottom: 12px;
      }

      .search {
        min-height: 42px;
        padding: 10px 12px;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .segment {
        min-height: 38px;
        border-radius: 8px;
        background: #ffffff;
        color: var(--muted);
        box-shadow: inset 0 0 0 1px var(--line);
        font-size: 13px;
        font-weight: 800;
      }

      .segment.active {
        background: var(--brand);
        color: #ffffff;
        box-shadow: none;
      }

      .link-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        margin-top: 10px;
        border-radius: 8px;
        padding: 0 12px;
        background: #fffdfb;
        color: var(--brand);
        box-shadow: inset 0 0 0 1px var(--line);
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
      }

      .compact-link {
        margin-top: 0;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .tabs {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
        background: rgba(255, 250, 245, 0.92);
        backdrop-filter: blur(18px);
        border-top: 1px solid rgba(234, 223, 216, 0.9);
      }

      .tabbar {
        max-width: 760px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 4px;
      }

      .tab {
        min-height: 54px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        gap: 3px;
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .tab svg,
      .icon-btn svg {
        width: 20px;
        height: 20px;
      }

      .tab.active {
        background: #ffffff;
        color: var(--brand);
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .empty,
      .error {
        padding: 18px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        text-align: center;
      }

      .error {
        color: var(--brand-dark);
        background: #fff0ee;
      }

      .hide {
        display: none !important;
      }

      @media (min-width: 720px) {
        .app {
          padding-inline: 24px;
        }

        .grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-height: 760px) {
        .intro-title {
          font-size: 30px;
        }

        .intro-copy {
          font-size: 15px;
          line-height: 1.5;
        }

        .intro-kicker {
          margin-top: 18px;
        }

        .intro-panel {
          gap: 8px;
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const API = "https://xiaoyue.yaojidecare.app/api/mobile";
      const tabs = [
        ["dashboard", "總覽", "M4 13h16M4 7h16M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"],
        ["bookings", "預約", "M8 2v4M16 2v4M3 10h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"],
        ["services", "服務", "M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7l3-7Z"],
        ["customers", "客戶", "M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"],
        ["payroll", "薪資", "M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6"],
        ["line", "權限", "M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v8Z"]
      ];
      const state = {
        token: localStorage.getItem("xiaoyue_mobile_token") || "",
        tab: "dashboard",
        authView: "intro",
        bookingFilter: "upcoming",
        bookingSearch: "",
        customerSearch: "",
        newBookingOpen: false,
        quickSaleOpen: false,
        editingBookingId: "",
        payrollRate: Number(localStorage.getItem("xiaoyue_payroll_rate") || 40),
        data: null,
        loading: false,
        error: "",
        lineStatus: null
      };

      const root = document.getElementById("root");
      const icon = (path) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="${path}"></path></svg>`;
      const fmtDate = (value) => new Intl.DateTimeFormat("zh-TW", { month: "2-digit", day: "2-digit", weekday: "short", hour: "2-digit", minute: "2-digit" }).format(new Date(value));
      const money = (value) => `NT$${Number(value || 0).toLocaleString("zh-TW")}`;
      const statusLabel = (status) => ({ CONFIRMED: "已確認", CANCELLED: "已取消", COMPLETED: "已完成", NO_SHOW: "爽約" }[status] || status);
      const pillClass = (status) => String(status || "").toLowerCase();
      const html = (value) => String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
      const attr = (value) => html(value)
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
      const isSameDay = (left, right) => left.getFullYear() === right.getFullYear() && left.getMonth() === right.getMonth() && left.getDate() === right.getDate();
      const digits = (value) => String(value || "").replace(/[^\d+]/g, "");
      const textMatch = (value, query) => String(value || "").toLowerCase().includes(query);
      const dateValue = (value) => {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? "" : date.toISOString().slice(0, 10);
      };
      const timeValue = (value) => {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
      };
      const defaultDate = () => new Date(Date.now() + 60 * 60 * 1000).toISOString().slice(0, 10);
      const defaultTime = () => {
        const date = new Date(Date.now() + 60 * 60 * 1000);
        date.setMinutes(Math.ceil(date.getMinutes() / 30) * 30, 0, 0);
        return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
      };
      const monthKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
      const isUnpaid = (item) => {
        const finalAmount = Number(item.finalAmount || 0);
        const paidAmount = Number(item.paidAmount || 0);
        return !["CANCELLED", "NO_SHOW"].includes(item.status) && !["PAID", "WAIVED"].includes(item.paymentStatus) && finalAmount > paidAmount;
      };
      const shouldCountRevenue = (item) => !["CANCELLED", "NO_SHOW"].includes(item.status);
      const isOpenBooking = (item) => !["CANCELLED", "COMPLETED", "NO_SHOW"].includes(item.status);
      const balanceDue = (item) => Math.max(Number(item.finalAmount || 0) - Number(item.paidAmount || 0), 0);
      const canCollect = (item) => isUnpaid(item) && balanceDue(item) > 0;

      function setTab(tab, options = {}) {
        state.tab = tab;
        if (options.bookingFilter) state.bookingFilter = options.bookingFilter;
        render();
      }

      function setBookingFilter(value) {
        state.bookingFilter = value;
        render();
      }

      function setBookingSearch(value) {
        state.bookingSearch = value;
        render();
      }

      function setCustomerSearch(value) {
        state.customerSearch = value;
        render();
      }

      function openNewBooking() {
        state.newBookingOpen = true;
        state.quickSaleOpen = false;
        state.editingBookingId = "";
        render();
      }

      function closeBookingForm() {
        state.newBookingOpen = false;
        state.quickSaleOpen = false;
        state.editingBookingId = "";
        render();
      }

      function openQuickSale() {
        state.quickSaleOpen = true;
        state.newBookingOpen = false;
        state.editingBookingId = "";
        render();
      }

      function editBooking(id) {
        state.editingBookingId = id;
        state.newBookingOpen = false;
        render();
      }

      function setPayrollRate(value) {
        state.payrollRate = Math.max(0, Math.min(100, Number(value || 0)));
        localStorage.setItem("xiaoyue_payroll_rate", String(state.payrollRate));
        render();
      }

      function filteredBookings(items) {
        const now = new Date();
        const query = state.bookingSearch.trim().toLowerCase();
        return [...items]
          .filter((item) => {
            const startsAt = new Date(item.startsAt);
            if (state.bookingFilter === "today" && !isSameDay(startsAt, now)) return false;
            if (state.bookingFilter === "upcoming" && startsAt < now) return false;
            if (state.bookingFilter === "active" && ["CANCELLED", "COMPLETED", "NO_SHOW"].includes(item.status)) return false;
            if (state.bookingFilter === "unpaid" && !isUnpaid(item)) return false;
            if (state.bookingFilter === "unassigned" && (item.staff?.id || !isOpenBooking(item))) return false;
            if (!query) return true;
            return [
              item.customerName,
              item.phone,
              item.note,
              item.service?.name,
              item.studio?.name,
              statusLabel(item.status)
            ].some((value) => textMatch(value, query));
          })
          .sort((left, right) => new Date(left.startsAt) - new Date(right.startsAt));
      }

      function filteredCustomers(items) {
        const query = state.customerSearch.trim().toLowerCase();
        if (!query) return items;
        return items.filter((customer) => [
          customer.name,
          customer.phone,
          customer.tags,
          customer.memberLevel
        ].some((value) => textMatch(value, query)));
      }

      async function api(path, options = {}) {
        const response = await fetch(`${API}${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}),
            ...(options.headers || {})
          }
        });
        const body = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(body.error || "連線失敗");
        return body;
      }

      async function login(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        state.loading = true;
        state.error = "";
        render();
        try {
          const result = await api("/login", {
            method: "POST",
            body: JSON.stringify({
              email: String(form.get("email") || ""),
              password: String(form.get("password") || "")
            })
          });
          state.token = result.token;
          localStorage.setItem("xiaoyue_mobile_token", result.token);
          await load();
        } catch (error) {
          state.error = error.message;
        } finally {
          state.loading = false;
          render();
        }
      }

      async function load() {
        if (!state.token) return;
        state.loading = true;
        state.error = "";
        render();
        try {
          state.data = await api("/summary");
        } catch (error) {
          if (error.message === "Unauthorized") {
            logout();
            return;
          }
          state.error = error.message;
        } finally {
          state.loading = false;
          render();
        }
      }

      function logout() {
        state.token = "";
        state.data = null;
        state.authView = "intro";
        localStorage.removeItem("xiaoyue_mobile_token");
        render();
      }

      function showLogin() {
        state.authView = "login";
        state.error = "";
        render();
      }

      function showIntro() {
        state.authView = "intro";
        state.error = "";
        render();
      }

      function introView() {
        return `
          <main class="landing">
            <section class="hero intro-hero">
              <div>
                <div class="brand">
                  <div class="mark">約</div>
                  <div>
                    <h1>小約</h1>
                    <p>小老闆營運管理</p>
                  </div>
                </div>
                <p class="intro-kicker">給小店、一人店、工作室、接案服務與現場生意</p>
                <h2 class="intro-title">把預約、收入、客戶與 LINE 通知收進同一個工作台</h2>
                <p class="intro-copy">小約讓小老闆用手機掌握每日服務、現場收入、客戶資料與官方帳號權限，少漏單、少手抄、少來回確認。</p>
              </div>
              <div class="intro-panel">
                <div class="intro-item">

      async function updateBooking(id, data) {
        state.loading = true;
        render();
        try {
          await api(`/bookings/${id}`, { method: "PATCH", body: JSON.stringify(data) });
          await load();
        } catch (error) {
          state.error = error.message;
          state.loading = false;
          render();
        }
      }

      function markPaid(id, amount) {
        updateBooking(id, {
          paymentStatus: "PAID",
          paidAmount: Number(amount || 0)
        });
      }

      function sendPaymentReminder(id) {
        updateBooking(id, { sendPaymentReminder: true });
      }

      function completeAndCollect(id, amount) {
        updateBooking(id, {
          status: "COMPLETED",
          paymentStatus: "PAID",
          paidAmount: Number(amount || 0)
        });
      }

      async function createBooking(event) {
        event.preventDefault();
        const form = new FormData(event.currentTarget);
        state.loading = true;
        state.error = "";
        render();
        try {
          await api("/bookings", {
            method: "POST",
            body: JSON.stringify({
              studioId: String(form.get("studioId") || ""),
              serviceId: String(form.get("serviceId") || ""),
              customerName: String(form.get("customerName") || ""),
              phone: String(form.get("phone") || ""),
              date: String(form.get("date") || ""),
              time: String(form.get("time") || ""),
              finalAmount: String(form.get("finalAmount") || ""),
              note: String(form.get("note") || "")
              ,staffId: String(form.get("staffId") || "")
            })

          state.bookingFilter = "upcoming";
          await load();

          state.error = error.message;
          state.loading = false;
          render();

      function dashboardView() {
        const data = state.data;
        const now = new Date();
        const currentMonth = monthKey(now);
        const todayBookings = data.bookings.filter((item) => isSameDay(new Date(item.startsAt), now));
        const upcoming = [...data.bookings].filter((item) => new Date(item.startsAt) >= now).sort((left, right) => new Date(left.startsAt) - new Date(right.startsAt)).slice(0, 5);
        const todayRevenue = todayBookings.reduce((sum, item) => sum + Number(item.finalAmount || 0), 0);
        const monthBookings = data.bookings.filter((item) => monthKey(new Date(item.startsAt)) === currentMonth && shouldCountRevenue(item));
        const monthRevenue = monthBookings.reduce((sum, item) => sum + Number(item.finalAmount || 0), 0);
        const unpaidBookings = data.bookings.filter(isUnpaid);
        const unpaidAmount = unpaidBookings.reduce((sum, item) => sum + Math.max(Number(item.finalAmount || 0) - Number(item.paidAmount || 0), 0), 0);
        const unassignedBookings = data.bookings.filter((item) => !item.staff?.id && isOpenBooking(item));
        const todayTodo = todayBookings.filter(isOpenBooking);
        const operations = data.operations || {};
        const dashboard = operations.dashboard || {};
        const displayedMonthRevenue = dashboard.monthRevenue ?? monthRevenue;
        const displayedUnpaidAmount = dashboard.unpaidAmount ?? unpaidAmount;
        const displayedUnpaidCount = dashboard.unpaidCount ?? unpaidBookings.length;
        const displayedUnassignedCount = dashboard.unassignedCount ?? unassignedBookings.length;
        const displayedTodayTodoCount = dashboard.todayTodoCount ?? todayTodo.length;
        return `
          <section class="grid">
            <div class="stat"><b>${money(displayedMonthRevenue)}</b><span>本月營收</span></div>
            <div class="stat"><b>${money(displayedUnpaidAmount)}</b><span>待收款</span></div>
            <div class="stat"><b>${displayedUnassignedCount}</b><span>待補排班</span></div>
            <div class="stat"><b>${displayedTodayTodoCount}</b><span>今日待辦</span></div>
          </section>
          <section class="section">
            <div class="section-head">
              <h2 class="section-title">快速操作</h2>
            </div>
            <div class="quick-actions">
              <button class="secondary" onclick="setTab('bookings', { bookingFilter: 'today' })">今日預約</button>
              <button class="secondary" onclick="setTab('bookings', { bookingFilter: 'upcoming' })">即將到來</button>
              <button class="secondary" onclick="setTab('bookings', { bookingFilter: 'unpaid' })">待收款</button>
              <button class="secondary" onclick="setTab('bookings', { bookingFilter: 'unassigned' })">未指派</button>
              <button class="secondary" onclick="openQuickSale()">記收入</button>
              <button class="secondary" onclick="setTab('customers')">找客戶</button>
              <button class="secondary" onclick="setTab('line')">LINE 權限</button>
            </div>
            ${state.quickSaleOpen ? quickSaleFormView() : ""}
          </section>
          <section class="section">
            <div class="section-head">
              <div>
                <h2 class="section-title">今日服務</h2>
                <p class="section-note">今天只處理這幾件事</p>
              </div>
              <button class="secondary" onclick="setTab('bookings', { bookingFilter: 'today' })">全部</button>
            </div>
            <div class="list">
              ${todayTodo.length ? todayTodo
                .sort((left, right) => new Date(left.startsAt) - new Date(right.startsAt))
                .slice(0, 4)
                .map(todayWorkCard)
                .join("") : `<div class="empty">今天沒有待服務預約</div>`}
            </div>
          </section>
          <section class="section">
            <div class="section-head">
              <div>
                <h2 class="section-title">營運提醒</h2>
                <p class="section-note">老闆每天先看這裡</p>
              </div>
            </div>
            <div class="list">
              ${displayedTodayTodoCount ? `<article class="card"><div class="row"><div class="title">今日還有 ${displayedTodayTodoCount} 筆待處理<small>${html(todayTodo.slice(0, 3).map((item) => item.customerName).join("、"))}</small></div><span class="pill confirmed">今天</span></div></article>` : `<article class="card"><div class="title">今日預約已處理完<small>目前沒有未完成的今日預約</small></div></article>`}
              ${displayedUnpaidCount ? `<article class="card"><div class="row"><div class="title">待收款 ${displayedUnpaidCount} 筆<small>尚待收 ${money(displayedUnpaidAmount)}</small></div><span class="pill no_show">收款</span></div></article>` : `<article class="card"><div class="title">沒有待收款<small>目前付款狀態看起來乾淨</small></div></article>`}
              ${displayedUnassignedCount ? `<article class="card"><div class="row"><div class="title">未指派員工 ${displayedUnassignedCount} 筆<small>${html(unassignedBookings.slice(0, 3).map((item) => item.customerName).join("、"))}</small></div><span class="pill cancelled">排班</span></div></article>` : `<article class="card"><div class="title">排班已補齊<small>目前沒有未指派的有效預約</small></div></article>`}

        `;

      function todayWorkCard(item) {
        const phone = digits(item.phone);
        const due = balanceDue(item);
        const collectAction = canCollect(item)
          ? `<button class="secondary" onclick="markPaid('${item.id}', ${Number(item.finalAmount || 0)})">收款</button>`
          : "";
        const reminderAction = due && item.lineUserId
          ? `<button class="secondary" onclick="sendPaymentReminder('${item.id}')">催LINE</button>`
          : "";
        const doneAction = canCollect(item)
          ? `<button class="primary inline-primary" onclick="completeAndCollect('${item.id}', ${Number(item.finalAmount || 0)})">完成收款</button>`
          : `<button class="primary inline-primary" onclick="updateBooking('${item.id}', { status: 'COMPLETED' })">完成</button>`;

        return `
          <article class="card">
            <div class="row">
              <div class="title">
                ${html(item.customerName)}
                <small>${fmtDate(item.startsAt)} · ${html(item.service?.name || "")} · ${html(item.staff?.name || "未指派")}</small>
              </div>
              <span class="pill ${pillClass(item.status)}">${statusLabel(item.status)}</span>
            </div>
            <p class="meta">${due ? `待收 ${money(due)}` : "付款已處理"}${item.note ? ` · ${html(item.note)}` : ""}</p>
            <div class="actions today-actions">
              ${phone ? `<a class="link-action compact-link" href="tel:${attr(phone)}">撥打</a>` : ""}
              ${collectAction}
              ${reminderAction}
              ${doneAction}
            </div>
          </article>
        `;
      }

      function bookingCard(item) {
        const phone = digits(item.phone);
        const due = balanceDue(item);
        const paymentText = due ? `待收 ${money(due)}` : "付款已處理";
        const collectAction = canCollect(item)
          ? `<button class="secondary" onclick="markPaid('${item.id}', ${Number(item.finalAmount || 0)})">收款</button>`
          : "";
        const reminderAction = due && item.lineUserId

          : "";
        const doneAction = canCollect(item)
          ? `<button class="secondary" onclick="completeAndCollect('${item.id}', ${Number(item.finalAmount || 0)})">完成收款</button>`
          : `<button class="secondary" onclick="updateBooking('${item.id}', { status: 'COMPLETED' })">完成</button>`;
        return `
          <article class="card">
            <div class="row">
              <div class="title">
                ${html(item.customerName)}
                <small>${fmtDate(item.startsAt)} · ${html(item.service?.name || "")} · ${html(item.staff?.name || "未指派")} · ${html(item.studio?.name || "")}</small>

              <span class="pill ${pillClass(item.status)}">${statusLabel(item.status)}</span>

            <p class="meta">${html(item.phone || "")}${item.finalAmount ? ` · ${money(item.finalAmount)}` : ""} · ${paymentText}${item.note ? ` · ${html(item.note)}` : ""}</p>
            ${phone ? `<a class="link-action" href="tel:${attr(phone)}">撥打 ${html(item.customerName)}</a>` : ""}
            <div class="actions">
              <button class="secondary" onclick="editBooking('${item.id}')">編輯</button>

              ${reminderAction}

              <button class="danger" onclick="updateBooking('${item.id}', { status: 'CANCELLED' })">取消</button>
            </div>
          </article>
        `;
      }

      function servicesView() {
        const services = state.data.services;
        const currentMonth = monthKey(new Date());
        const serviceStats = new Map();

        for (const stat of state.data.operations?.serviceStats || []) {
          serviceStats.set(stat.serviceId, { count: stat.count, revenue: stat.revenue });
        }

        if (!serviceStats.size) {
          for (const booking of state.data.bookings.filter((item) => monthKey(new Date(item.startsAt)) === currentMonth && shouldCountRevenue(item))) {
          const id = booking.service?.id;
          if (!id) continue;
          const stat = serviceStats.get(id) || { count: 0, revenue: 0 };
          stat.count += 1;
          stat.revenue += Number(booking.finalAmount || 0);
          serviceStats.set(id, stat);
          }
        }

        return `
          <section class="section">
            <div class="section-head">
              <h2 class="section-title">服務</h2>
              <span class="pill">${services.length} 項</span>
            </div>
            <div class="list">
              ${services.map((service) => `
                <article class="card">
                  <div class="row">
                    <div class="title">
                      ${html(service.name)}
                      <small>${html(service.category)} · ${service.durationMin} 分鐘</small>
                    </div>
                    <span class="pill">${service.active ? "上架" : "停用"}</span>
                  </div>
                  <p class="meta">${money(service.price)} · 本月 ${serviceStats.get(service.id)?.count || 0} 筆 · ${money(serviceStats.get(service.id)?.revenue || 0)}${service.description ? ` · ${html(service.description)}` : ""}</p>
                </article>
              `).join("") || `<div class="empty">沒有服務</div>`}
            </div>
          </section>
        `;
      }

      function customersView() {
        const allCustomers = state.data.customers;
        const customers = filteredCustomers(allCustomers);
        return `
          <section class="section">
            <div class="section-head">
              <h2 class="section-title">客戶</h2>
              <span class="pill">${customers.length} / ${allCustomers.length} 位</span>
            </div>
            <div class="toolbar">
              <input class="search" value="${attr(state.customerSearch)}" oninput="setCustomerSearch(this.value)" placeholder="搜尋姓名、電話、標籤、會員等級" />
            </div>
            <div class="list">
              ${customers.map((customer) => `
                <article class="card">
                  <div class="row">
                    <div class="title">
                      ${html(customer.name)}
                      <small>${html(customer.phone)}${customer.memberLevel ? ` · ${html(customer.memberLevel)}` : ""}</small>
                    </div>
                    <span class="pill">${customer.totalBookings} 次</span>
                  </div>
                  <p class="meta">${html(customer.tags || "未標籤")}${customer.isVip ? " · VIP" : ""}${customer.isBlocked ? " · 封鎖" : ""}</p>
                  ${digits(customer.phone) ? `<a class="link-action" href="tel:${attr(digits(customer.phone))}">撥打 ${html(customer.name)}</a>` : ""}
                </article>
              `).join("") || `<div class="empty">沒有客戶</div>`}
            </div>
          </section>
        `;
      }

      function payrollView() {
        const now = new Date();
        const currentMonth = monthKey(now);
        const monthBookings = state.data.bookings.filter((booking) => monthKey(new Date(booking.startsAt)) === currentMonth && shouldCountRevenue(booking));
        const rows = new Map();

        for (const staff of state.data.staff || []) {
          rows.set(staff.id, {
            id: staff.id,
            name: staff.name,
            role: staff.role || "",
            bookings: 0,
            completed: 0,
            revenue: 0
          });
        }

        rows.set("unassigned", {
          id: "unassigned",
          name: "未指派",
          role: "待排班",
          bookings: 0,
          completed: 0,
          revenue: 0
        });

        for (const booking of monthBookings) {
          const key = booking.staff?.id || "unassigned";
          const row = rows.get(key) || rows.get("unassigned");
          row.bookings += 1;
          row.completed += booking.status === "COMPLETED" ? 1 : 0;
          row.revenue += Number(booking.finalAmount || 0);
        }

        const backendPayroll = state.data.operations?.payroll;
        const data = backendPayroll?.rows?.length
          ? backendPayroll.rows.map((row) => ({
            id: row.staffId || "unassigned",
            name: row.name,
            role: row.role || "",
            bookings: row.bookings,
            completed: row.completed,
            revenue: row.revenue
          }))
          : [...rows.values()].filter((row) => row.bookings > 0 || row.id !== "unassigned");
        const totalRevenue = backendPayroll?.totalRevenue ?? data.reduce((sum, row) => sum + row.revenue, 0);
        const totalBookings = backendPayroll?.totalBookings ?? monthBookings.length;
        const estimatedPay = Math.round(totalRevenue * state.payrollRate / 100);

        return `
          <section class="grid">
            <div class="stat"><b>${totalBookings}</b><span>本月預約</span></div>
            <div class="stat"><b>${money(totalRevenue)}</b><span>本月營收</span></div>
            <div class="stat"><b>${state.payrollRate}%</b><span>抽成估算</span></div>
            <div class="stat"><b>${money(estimatedPay)}</b><span>預估薪資</span></div>
          </section>
          <section class="section">
            <div class="section-head">
              <div>
                <h2 class="section-title">薪資估算</h2>
                <p class="section-note">${currentMonth} · 依預約 finalAmount 計算</p>
              </div>
            </div>
            <div class="field">
              <label>抽成比例</label>
              <input type="number" min="0" max="100" value="${state.payrollRate}" oninput="setPayrollRate(this.value)" />
            </div>
            <div class="list" style="margin-top:12px;">
              ${data.map((row) => `
                <article class="card">
                  <div class="row">
                    <div class="title">${html(row.name)}<small>${html(row.role || "員工")} · ${row.bookings} 筆 · 完成 ${row.completed} 筆</small></div>
                    <span class="pill">${money(Math.round(row.revenue * state.payrollRate / 100))}</span>
                  </div>
                  <p class="meta">營收 ${money(row.revenue)}${row.id === "unassigned" ? " · 請回預約頁補負責員工" : ""}</p>
                </article>
              `).join("") || `<div class="empty">本月還沒有可估算的預約</div>`}
            </div>
          </section>
        `;
      }

      function lineView() {
        const studios = state.data.studios;
        const studio = studios[0];
        if (!studio) return `<div class="empty">尚未建立店家</div>`;
        return `
          <section class="section">
            <div class="section-head">
              <div>
                <h2 class="section-title">LINE 權限</h2>
                <p class="section-note">${html(studio.name)}</p>
              </div>
              <button class="secondary" onclick="checkLine('${attr(studio.id)}')">檢查</button>
            </div>
            ${state.lineStatus ? `<div class="card"><b>${html(state.lineStatus.displayName || "LINE 狀態")}</b><p class="meta">${html(state.lineStatus.webhookUrl || "")}</p></div>` : ""}
            <form class="card" onsubmit="saveLine(event)">
              <input type="hidden" name="studioId" value="${attr(studio.id)}" />
              <div class="field">
                <label>Channel access token</label>
                <textarea name="token" placeholder="${studio.hasLineChannelAccessToken ? "已儲存，留空不變" : ""}"></textarea>
              </div>
              <div class="field">
                <label>Channel secret</label>
                <input name="secret" type="password" placeholder="${studio.hasLineChannelSecret ? "已儲存，留空不變" : ""}" />
              </div>
              <div class="field">
                <label>Webhook URL</label>
                <input name="webhookUrl" value="${attr(studio.lineWebhookUrl || `https://xiaoyue.yaojidecare.app/api/line/webhook/${studio.slug}`)}" />
              </div>
              <div class="field">
                <label>Admin User ID</label>
                <input name="adminUserId" />
              </div>
              <label class="row" style="justify-content:flex-start;margin-top:14px;">
                <input name="enabled" type="checkbox" ${studio.lineWebhookEnabled ? "checked" : ""} style="width:auto;" />
                啟用 webhook
              </label>
              <button class="primary" type="submit">儲存</button>
            </form>
          </section>
        `;
      }

      function shell() {
        const data = state.data;
        const content = state.error
            ? `<div class="error">${html(state.error)}</div>`
            : !data
              ? `<div class="empty">載入中</div>`
              : ({
                dashboard: dashboardView,
                bookings: bookingsView,
                services: servicesView,
                customers: customersView,
                payroll: payrollView,
                line: lineView
              }[state.tab] || dashboardView)();

        return `
          <div class="app">
            <header class="topbar">
              <div class="brand">
                <div class="mark">約</div>
                <div>
                  <h1>小約</h1>
                  <p>${html(data?.owner?.name || "店家工作台")}</p>
                </div>
              </div>
              <button class="icon-btn" onclick="logout()" aria-label="登出">${icon("M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9")}</button>
            </header>
            <main class="screen">${content}</main>
          </div>
          <nav class="tabs">
            <div class="tabbar">
              ${tabs.map(([key, label, path]) => `
                <button class="tab ${state.tab === key ? "active" : ""}" onclick="setTab('${key}')">
                  ${icon(path)}
                  <span>${label}</span>
                </button>
              `).join("")}
            </div>
          </nav>
        `;
      }

      function render() {
        document.body.classList.toggle("intro-locked", !state.token && state.authView !== "login");
        try {
          root.innerHTML = state.token ? shell() : (state.authView === "login" ? loginView() : introView());
        } catch (error) {
          console.error(error);
          root.innerHTML = `<main class="login"><section class="hero"><div class="brand"><div class="mark">約</div><div><h1>小約</h1><p>店家工作台</p></div></div><p class="error">畫面載入失敗，請重新登入。</p><button class="primary" onclick="logout()">重新登入</button></section></main>`;
        }
      }

      window.showLogin = showLogin;
      window.showIntro = showIntro;
      window.setTab = setTab;
      window.setBookingFilter = setBookingFilter;
      window.setBookingSearch = setBookingSearch;
      window.setCustomerSearch = setCustomerSearch;
      window.openNewBooking = openNewBooking;
      window.openQuickSale = openQuickSale;
      window.closeBookingForm = closeBookingForm;
      window.editBooking = editBooking;
      window.setPayrollRate = setPayrollRate;
      window.login = login;
      window.logout = logout;
      window.load = load;
      window.updateBooking = updateBooking;
      window.markPaid = markPaid;
      window.completeAndCollect = completeAndCollect;
      window.createBooking = createBooking;
      window.createSale = createSale;
      window.saveBooking = saveBooking;
      window.checkLine = checkLine;
      window.saveLine = saveLine;
      render();
      load();
    </script>
  </body>
</html>
